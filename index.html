<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Search</title>
  <meta name="description" content="Live search dashboard.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <div class="background-glows">
      <div class="glow glow-1"></div>
      <div class="glow glow-2"></div>
    </div>

    <main class="card">
      <div class="card-border-gradient"></div>
      <div class="card-content">
        <div id="pull-to-refresh" class="ptr-container">
          <span id="ptr-text" class="ptr-text">PULL TO REFRESH...</span>
        </div>
        <div class="top-actions">
          <button id="favorites-refresh" class="favorites-refresh" type="button" aria-label="즐겨찾기 새로고침">
            <svg class="favorites-refresh-svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
              <rect x="4" y="2" width="8" height="2"/>
              <rect x="11" y="4" width="2" height="2"/>
              <rect x="12" y="5" width="2" height="5"/>
              <rect x="4" y="12" width="8" height="2"/>
              <rect x="3" y="10" width="2" height="2"/>
              <rect x="2" y="6" width="2" height="5"/>
              <rect x="10" y="5" width="6" height="2"/>
              <rect x="12" y="7" width="2" height="2"/>
              <rect x="0" y="9" width="6" height="2"/>
              <rect x="2" y="7" width="2" height="2"/>
            </svg>
          </button>
          <button id="favorites-panel-toggle" class="favorites-panel-toggle" type="button" aria-label="즐겨찾기 목록 열기" aria-expanded="false">
            <span class="favorites-panel-toggle-dots">
              <span class="favorites-panel-toggle-dot favorites-panel-toggle-dot--up" id="favorites-panel-alert-dot-up"></span>
              <span class="favorites-panel-toggle-dot favorites-panel-toggle-dot--down" id="favorites-panel-alert-dot-down"></span>
            </span>
            <span class="favorites-panel-toggle-star">
              <svg class="pixel-star-svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                <rect x="7" y="1" width="2" height="1"/>
                <rect x="7" y="2" width="2" height="1"/>
                <rect x="6" y="3" width="4" height="1"/>
                <rect x="6" y="4" width="4" height="1"/>
                <rect x="5" y="5" width="6" height="1"/>
                <rect x="1" y="6" width="14" height="1"/>
                <rect x="2" y="7" width="12" height="1"/>
                <rect x="3" y="8" width="10" height="1"/>
                <rect x="4" y="9" width="8" height="1"/>
                <rect x="3" y="10" width="10" height="1"/>
                <rect x="2" y="11" width="12" height="1"/>
                <rect x="1" y="12" width="4" height="1"/>
                <rect x="11" y="12" width="4" height="1"/>
                <rect x="1" y="13" width="3" height="1"/>
                <rect x="12" y="13" width="3" height="1"/>
                <rect x="2" y="14" width="1" height="1"/>
                <rect x="13" y="14" width="1" height="1"/>
              </svg>
            </span>
          </button>
        </div>
        <div class="theme-board" id="theme-board"></div>

        <section id="favorites-panel" class="favorites-panel hidden" aria-label="즐겨찾기 목록">
          <div class="favorites-panel-header">
            <span class="favorites-panel-count" id="favorites-panel-count">0</span>
            <button id="favorites-order-toggle" class="favorites-order-toggle" type="button">순서 변경</button>
          </div>
          <div id="favorites-list" class="favorites-list"></div>
        </section>

        <div class="exchange-box" id="exchange-box">
          <!-- 환율 메인 정보 -->
          <div id="exchange-main-content" style="width: 100%;">
            <div class="exchange-row">
              <div class="exchange-item" id="usd-item">
                <div class="exchange-info">
                  <span class="exchange-label">USD</span>
                  <span class="exchange-rate" id="usd-rate"><span class="rate-loading"></span></span>
                  <span class="exchange-change" id="usd-change"></span>
                </div>
              </div>
              <div class="exchange-separator"></div>
              <div class="exchange-item" id="jpy-item">
                <div class="exchange-info">
                  <span class="exchange-label">JPY</span>
                  <span class="exchange-rate" id="jpy-rate"><span class="rate-loading"></span></span>
                  <span class="exchange-change" id="jpy-change"></span>
                </div>
              </div>
            </div>
            <div class="exchange-meta" id="exchange-updated"></div>
          </div>

          <!-- 테마 툴팁 정보 -->
          <div id="exchange-tooltip-content" style="display: none; width: 100%; flex-direction: column;"></div>
        </div>

        <div class="search-section">
          <div class="search-container">
            <input type="text" id="stock-search" autocomplete="off" disabled>
            <div id="search-loader" class="search-loader"></div>
            <div id="dropdown-list" class="autocomplete-dropdown hidden"></div>
          </div>
        </div>

        <div id="stock-info-panel" class="stock-info-panel hidden">
          <div class="stock-info-header">
            <span id="stock-market-badge" class="market-badge"></span>
            <div class="stock-header-actions">
              <span id="stock-code" class="stock-code"></span>
              <button id="stock-alert-toggle" class="stock-alert-toggle hidden" type="button" aria-label="가격 알림 설정">
                <span class="stock-alert-toggle-bell">
                  <svg class="pixel-bell-svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                    <rect x="6" y="1" width="4" height="1"/>
                    <rect x="5" y="2" width="1" height="1"/>
                    <rect x="10" y="2" width="1" height="1"/>
                    <rect x="5" y="3" width="6" height="1"/>
                    <rect x="4" y="4" width="8" height="1"/>
                    <rect x="4" y="5" width="8" height="1"/>
                    <rect x="3" y="6" width="10" height="1"/>
                    <rect x="3" y="7" width="10" height="1"/>
                    <rect x="3" y="8" width="10" height="1"/>
                    <rect x="2" y="9" width="12" height="1"/>
                    <rect x="1" y="10" width="14" height="2"/>
                    <rect x="7" y="12" width="2" height="2"/>
                    <rect x="6" y="14" width="4" height="1"/>
                  </svg>
                </span>
              </button>
              <button id="favorite-toggle" class="favorite-toggle" type="button" aria-label="즐겨찾기 추가">
                <span class="favorite-toggle-dot" id="favorite-alert-dot"></span>
                <span class="favorite-toggle-star" id="favorite-toggle-star">
                  <svg class="pixel-star-svg" viewBox="0 0 16 16" width="16" height="16" fill="currentColor">
                    <rect x="7" y="1" width="2" height="1"/>
                    <rect x="7" y="2" width="2" height="1"/>
                    <rect x="6" y="3" width="4" height="1"/>
                    <rect x="6" y="4" width="4" height="1"/>
                    <rect x="5" y="5" width="6" height="1"/>
                    <rect x="1" y="6" width="14" height="1"/>
                    <rect x="2" y="7" width="12" height="1"/>
                    <rect x="3" y="8" width="10" height="1"/>
                    <rect x="4" y="9" width="8" height="1"/>
                    <rect x="3" y="10" width="10" height="1"/>
                    <rect x="2" y="11" width="12" height="1"/>
                    <rect x="1" y="12" width="4" height="1"/>
                    <rect x="11" y="12" width="4" height="1"/>
                    <rect x="1" y="13" width="3" height="1"/>
                    <rect x="12" y="13" width="3" height="1"/>
                    <rect x="2" y="14" width="1" height="1"/>
                    <rect x="13" y="14" width="1" height="1"/>
                  </svg>
                </span>
              </button>
            </div>
          </div>
          <h2 id="stock-name" class="stock-name"></h2>
          <div class="stock-price-container">
            <div id="stock-price" class="stock-price">-</div>
            <div id="stock-price-change" class="stock-price-change">
              <span id="change-indicator"></span>
              <span id="change-val">-</span>
              <span id="change-ratio">-</span>
            </div>
          </div>

          <div id="stock-alert-panel" class="stock-alert-panel hidden">
            <div class="alert-panel-title">가격 알림 설정</div>
            <div class="alert-type-selector">
              <label class="alert-radio-label">
                <input type="radio" name="alert-type" value="percent" checked>
                <span>등락률</span>
              </label>
              <label class="alert-radio-label">
                <input type="radio" name="alert-type" value="price_above">
                <span>지정가 이상 (▲)</span>
              </label>
              <label class="alert-radio-label">
                <input type="radio" name="alert-type" value="price_below">
                <span>지정가 이하 (▼)</span>
              </label>
              <label class="alert-radio-label">
                <input type="radio" name="alert-type" value="none">
                <span>알림 끔</span>
              </label>
            </div>
            <div class="alert-value-input-container">
              <div id="alert-percent-inputs" class="alert-input-group">
                <input type="number" id="alert-percent-value" min="0.1" max="100" step="0.1" value="3.0">
                <span class="alert-input-unit">% 이상 변동 시</span>
              </div>
              <div id="alert-price-inputs" class="alert-input-group hidden">
                <input type="number" id="alert-price-value" min="0" placeholder="목표 가격 입력">
                <span id="alert-price-unit" class="alert-input-unit">KRW</span>
              </div>
            </div>
            <div class="alert-panel-actions">
              <button type="button" id="alert-settings-save" class="alert-save-btn">저장</button>
            </div>
          </div>

          <!-- 미니 주가 차트 컨테이너 -->
          <div id="stock-chart-container" class="stock-chart-container hidden">
            <div class="chart-header">
              <span class="chart-title">최근 15영업일 추이</span>
              <span id="chart-period-val" class="chart-period-val">-</span>
            </div>
            <canvas id="stock-sparkline-canvas" width="400" height="110"></canvas>
          </div>

          <!-- 뉴스 수집 및 요약 컨테이너 -->
          <div id="stock-news-container" class="stock-news-container hidden">
            <div class="news-header">
              <span class="news-title">📰 오늘의 뉴스 요약</span>
              <span id="news-count-badge" class="news-count-badge">0</span>
            </div>
            <div id="news-summary-box" class="news-summary-box"></div>
            <div id="news-list" class="news-list"></div>
          </div>

          <div class="stock-panel-footer">
            <button id="stock-panel-close" class="stock-panel-close" type="button" aria-label="종목 닫기">닫기</button>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
