<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Search</title>
  <meta name="description" content="Live search dashboard.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <main class="window main-window">
      <!-- 윈도우 타이틀바 -->
      <div class="title-bar">
        <div class="title-bar-text">
          <svg viewBox="0 0 16 16" width="16" height="16" style="margin-right: 6px; shape-rendering: crispEdges;">
            <rect x="2" y="2" width="12" height="12" fill="#c0c0c0"/>
            <rect x="2" y="2" width="12" height="2" fill="#000080"/>
            <rect x="4" y="5" width="8" height="2" fill="#00ffcc"/>
            <rect x="4" y="8" width="5" height="2" fill="#ff0055"/>
          </svg>
          stonks-9800.exe - Live Search
        </div>
        <div class="title-bar-controls">
          <button aria-label="Minimize" type="button"></button>
          <button aria-label="Maximize" type="button"></button>
          <button id="favorites-panel-toggle" class="favorites-panel-toggle" type="button" aria-label="Close" aria-expanded="false"></button>
        </div>
      </div>

      <div class="window-body">
        <div class="top-menu-bar">
          <span class="menu-item">파일(F)</span>
          <span class="menu-item">보기(V)</span>
          <span class="menu-item">즐겨찾기(A)</span>
          <span class="menu-item">도움말(H)</span>
        </div>

        <div class="top-actions">
          <button id="favorites-refresh" class="favorites-refresh win-btn" type="button" aria-label="새로고침">
            새로고침(R)
          </button>
          <span class="favorites-panel-toggle-dots" style="display:none;">
            <span class="favorites-panel-toggle-dot favorites-panel-toggle-dot--up" id="favorites-panel-alert-dot-up"></span>
            <span class="favorites-panel-toggle-dot favorites-panel-toggle-dot--down" id="favorites-panel-alert-dot-down"></span>
          </span>
        </div>

        <div class="theme-board" id="theme-board"></div>

        <section id="favorites-panel" class="favorites-panel hidden" aria-label="즐겨찾기 목록">
          <div class="favorites-panel-header">
            <div class="fav-count-box">
              개수: <span class="favorites-panel-count" id="favorites-panel-count">0</span>
            </div>
            <button id="favorites-order-toggle" class="favorites-order-toggle win-btn" type="button">순서 변경</button>
          </div>
          <div id="favorites-list" class="favorites-list window-inset"></div>
        </section>

        <div class="exchange-box" id="exchange-box">
          <!-- 환율 메인 정보 -->
          <div id="exchange-main-content" style="width: 100%;">
            <div class="exchange-row">
              <div class="exchange-item" id="usd-item">
                <div class="exchange-info">
                  <span class="exchange-label">USD/KRW</span>
                  <span class="exchange-rate" id="usd-rate"><span class="rate-loading"></span></span>
                  <span class="exchange-change" id="usd-change"></span>
                </div>
              </div>
              <div class="exchange-separator"></div>
              <div class="exchange-item" id="jpy-item">
                <div class="exchange-info">
                  <span class="exchange-label">JPY/KRW(100엔)</span>
                  <span class="exchange-rate" id="jpy-rate"><span class="rate-loading"></span></span>
                  <span class="exchange-change" id="jpy-change"></span>
                </div>
              </div>
            </div>
            <div class="exchange-meta" id="exchange-updated"></div>
          </div>

          <!-- 테마 툴팁 정보 -->
          <div id="exchange-tooltip-content" class="window-inset" style="display: none; width: 100%; flex-direction: column; padding: 4px; box-sizing: border-box; background: #ffffff; color: #000000;"></div>
        </div>

        <div class="search-section">
          <div class="search-container">
            <input type="text" id="stock-search" autocomplete="off" disabled placeholder="종목 코드 또는 이름을 검색하세요...">
            <div id="search-loader" class="search-loader"></div>
            <div id="dropdown-list" class="autocomplete-dropdown hidden window-inset"></div>
          </div>
        </div>

        <div id="stock-info-panel" class="stock-info-panel hidden">
          <div class="stock-info-header">
            <span id="stock-market-badge" class="market-badge"></span>
            <div class="stock-header-actions">
              <span id="stock-code" class="stock-code"></span>
              <button id="stock-alert-toggle" class="stock-alert-toggle hidden win-btn" type="button" aria-label="가격 알림 설정">
                알림(A)
              </button>
              <button id="favorite-toggle" class="favorite-toggle win-btn" type="button" aria-label="즐겨찾기 추가">
                관심★
                <span class="favorite-toggle-dot" id="favorite-alert-dot"></span>
              </button>
            </div>
          </div>
          <h2 id="stock-name" class="stock-name"></h2>
          <div class="stock-price-container window-inset">
            <div id="stock-price" class="stock-price">-</div>
            <div id="stock-price-change" class="stock-price-change">
              <span id="change-indicator"></span>
              <span id="change-val">-</span>
              <span id="change-ratio">-</span>
            </div>
          </div>

          <div id="stock-alert-panel" class="stock-alert-panel hidden window-inset">
            <div class="alert-panel-title">가격 알림 설정</div>
            <div class="alert-type-selector">
              <label class="alert-radio-label">
                <input type="radio" name="alert-type" value="percent" checked>
                <span>등락률</span>
              </label>
              <label class="alert-radio-label">
                <input type="radio" name="alert-type" value="price_above">
                <span>지정가 이상 (▲)</span>
              </label>
              <label class="alert-radio-label">
                <input type="radio" name="alert-type" value="price_below">
                <span>지정가 이하 (▼)</span>
              </label>
              <label class="alert-radio-label">
                <input type="radio" name="alert-type" value="none">
                <span>알림 끔</span>
              </label>
            </div>
            <div class="alert-value-input-container">
              <div id="alert-percent-inputs" class="alert-input-group">
                <input type="number" id="alert-percent-value" min="0.1" max="100" step="0.1" value="3.0">
                <span class="alert-input-unit">% 이상 변동 시</span>
              </div>
              <div id="alert-price-inputs" class="alert-input-group hidden">
                <input type="number" id="alert-price-value" min="0" placeholder="목표 가격 입력">
                <span id="alert-price-unit" class="alert-input-unit">KRW</span>
              </div>
            </div>
            <div class="alert-panel-actions">
              <button type="button" id="alert-settings-save" class="alert-save-btn win-btn">저장</button>
            </div>
          </div>

          <!-- 미니 주가 차트 컨테이너 -->
          <div id="stock-chart-container" class="stock-chart-container hidden">
            <div class="chart-header">
              <span class="chart-title">최근 15영업일 추이</span>
              <span id="chart-period-val" class="chart-period-val">-</span>
            </div>
            <div class="window-inset chart-canvas-wrapper" style="background: #ffffff; padding: 4px;">
              <canvas id="stock-sparkline-canvas" width="400" height="110" style="background: #ffffff;"></canvas>
            </div>
          </div>

          <!-- 뉴스 수집 및 요약 컨테이너 -->
          <div id="stock-news-container" class="stock-news-container hidden">
            <div class="news-header">
              <span class="news-title">📰 오늘의 뉴스 요약</span>
              <span id="news-count-badge" class="news-count-badge">0</span>
            </div>
            <div id="news-summary-box" class="news-summary-box window-inset" style="background: #ffffff; color: #000000; padding: 6px; margin-bottom: 8px;"></div>
            <div id="news-list" class="news-list window-inset" style="background: #ffffff; color: #000000; padding: 6px;"></div>
          </div>

          <div class="stock-panel-footer">
            <button id="stock-panel-close" class="stock-panel-close win-btn" type="button" aria-label="종목 닫기">확인</button>
          </div>
        </div>

      </div>

      <!-- 윈도우 상태표시줄 (Statusbar) -->
      <div class="status-bar">
        <p class="status-bar-field">시스템 준비됨</p>
        <p class="status-bar-field" id="refresh-status">자동 갱신: 대기 중</p>
        <p class="status-bar-field" style="max-width: 90px; text-align: center;">KST 15:54</p>
      </div>
    </main>
  </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
